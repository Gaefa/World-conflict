name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install all dependencies
        run: npm install

      - name: Force-install electron locally in apps/desktop
        # Workaround: npm hoists electron to the root node_modules in this
        # monorepo, but electron-builder requires electron to be resolvable
        # from apps/desktop/node_modules to compute the version. Install it
        # directly here with --no-save so package.json stays clean.
        run: npm install electron@35.7.5 electron-builder@26.8.1 --no-save --no-package-lock
        working-directory: apps/desktop

      - name: Build server (esbuild bundle)
        run: npm run build
        working-directory: apps/server

      - name: Verify server bundle
        run: |
          test -f apps/server/dist/index.js || (echo "Server bundle missing" && exit 1)
          echo "Server bundle size: $(wc -c < apps/server/dist/index.js) bytes"
        shell: bash

      - name: Build web (static export)
        run: npx next build
        working-directory: apps/web
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify static export exists
        run: |
          test -f apps/web/out/index.html || (echo "STATIC EXPORT NOT FOUND" && exit 1)
          echo "Static export size: $(du -sh apps/web/out)"
        shell: bash

      - name: Build Electron (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish never
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: conflict-game-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: conflict-game-mac
          path: dist/
        continue-on-error: true

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: conflict-game-win
          path: dist/
        continue-on-error: true

      - name: Check if any artifacts exist
        id: check
        run: |
          if ls dist/* 2>/dev/null; then
            echo "has_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        if: steps.check.outputs.has_files == 'true'
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check.outputs.has_files == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: "Build ${{ steps.sha.outputs.short }}"
          body: |
            Автоматическая сборка десктоп-приложения.

            - **macOS**: `Conflict.Game-*.dmg`
            - **Windows**: `Conflict.Game-*.exe`
          files: dist/*
          draft: false
          prerelease: true
